<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jersivo – Football Jerseys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #1a1a1a;
      --bg-bar: #141414;
      --text-light: #e5e5e5;
      --text-gray: #999;
      --border-dark: #2a2a2a;
      --grad-start: #48A6FD;
      --grad-end: #04FBFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-dark); color: var(--text-light); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── MAINTENANCE ── */
    #maintenance-screen {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #1c1c1c;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    #maintenance-screen h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: #aaa; margin-bottom: 1rem; }
    #maintenance-screen p { color: #666; font-size: 0.95rem; }
    #maintenance-screen a { color: #48A6FD; text-decoration: none; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border-dark);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; height: 60px;
    }
    .navbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }
    .cart-btn {
      position: relative; background: none; border: none; cursor: pointer;
      color: var(--text-light); padding: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .cart-btn svg { width: 24px; height: 24px; }
    .cart-badge {
      position: absolute; top: 2px; right: 2px;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #000; font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px; line-height: 1;
    }
    .cart-badge.hidden { display: none; }

    /* ── HERO ── */
    .hero {
      position: relative; min-height: 480px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
      background: url('https://res.cloudinary.com/dds7d6yvs/image/upload/v1774122071/pexels-scgough-19186210_sru0l5.jpg') center/cover no-repeat;
    }
    .hero::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.40);
    }
    .hero-content { position: relative; z-index: 1; padding: 2rem 1.5rem; }
    .hero-content h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.06em; line-height: 1;
      color: #fff;
    }
    .hero-content p {
      margin-top: 0.75rem;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: rgba(255,255,255,0.65); letter-spacing: 0.04em;
    }

    /* ── CATEGORY BAR ── */
    .category-section {
      background: #111; border-bottom: 1px solid var(--border-dark);
      padding: 0.9rem 1.2rem 0;
      position: relative;
    }
    .category-tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
    }
    .cat-tab {
      background: none; border: 1px solid #333; border-radius: 50px;
      color: var(--text-gray); font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.02em;
      padding: 6px 16px; cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-tab:hover { border-color: #555; color: var(--text-light); }
    .cat-tab.active {
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      border-color: transparent; color: #000; font-weight: 600;
    }

    /* ── FILTER ROW (continuation of category bar) ── */
    .filter-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 0 0.9rem;
    }
    .products-count { font-size: 0.82rem; color: var(--text-gray); }
    .team-select {
      background: #1a1a1a; border: 1px solid var(--border-dark);
      color: var(--text-light); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; padding: 6px 12px 6px 12px;
      border-radius: 6px; cursor: pointer; outline: none;
      min-width: 160px;
    }
    .team-select:focus { border-color: var(--grad-start); }
    .team-select option { background: #1a1a1a; }

    /* ── PRODUCT GRID ── */
    .products-section { padding: 1.5rem 1.2rem 3rem; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
    }
    @media (min-width: 1200px) {
      .products-grid { grid-template-columns: repeat(4, 1fr); gap: 1.4rem; }
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: var(--bg-card); border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border-dark);
      transition: box-shadow 0.25s, transform 0.25s;
      display: flex; flex-direction: column;
    }
    .product-card:hover {
      box-shadow: 0 8px 32px rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }
    .card-image-wrap {
      position: relative; aspect-ratio: 2/3; overflow: hidden; cursor: pointer;
    }
    .card-image-wrap img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: opacity 0.35s ease;
      -webkit-user-drag: none;
    }
    .card-img-secondary { opacity: 0; }
    .card-image-wrap.flipped .card-img-primary { opacity: 0; }
    .card-image-wrap.flipped .card-img-secondary { opacity: 1; }
    .card-image-wrap:hover .card-img-primary { opacity: 0; }
    .card-image-wrap:hover .card-img-secondary { opacity: 1; }

    .card-body { padding: 0.85rem 0.85rem 1rem; display: flex; flex-direction: column; gap: 0.6rem; flex: 1; }
    .card-name { font-size: 0.82rem; font-weight: 600; color: var(--text-light); line-height: 1.3; }
    .card-price {
      font-size: 0.9rem; font-weight: 700;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .size-select {
      background: #111; border: 1px solid var(--border-dark);
      color: var(--text-light); font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; padding: 5px 8px; border-radius: 6px;
      width: 100%; outline: none; cursor: pointer;
    }
    .size-select:focus { border-color: var(--grad-start); }
    .size-select option { background: #1a1a1a; }
    .add-cart-btn {
      width: 100%; padding: 8px 0;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      border: none; border-radius: 7px;
      color: #000; font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.03em;
      cursor: pointer; transition: opacity 0.15s, transform 0.15s;
    }
    .add-cart-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .add-cart-btn:active { transform: scale(0.98); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; border: 1px solid #333;
      color: var(--text-light); padding: 10px 20px; border-radius: 8px;
      font-size: 0.85rem; z-index: 200; transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    .loading-state { text-align: center; padding: 4rem; color: var(--text-gray); }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #222;
      border-top-color: var(--grad-start); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Maintenance Screen -->
<div id="maintenance-screen">
  <h2>Under Maintenance</h2>
  <p>Website is under maintenance, please contact the <a href="https://instagram.com/_sambitgope" target="_blank">admin</a> if you're seeing this for more than 24 hours.</p>
</div>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="navbar-logo">JERSIVO</a>
  <button class="cart-btn" onclick="location.href='/cart.html'" aria-label="Cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span class="cart-badge hidden" id="cart-badge">0</span>
  </button>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1>WEAR THE GAME</h1>
    <p>Premium football jerseys — club, national &amp; retro editions</p>
  </div>
</section>

<!-- Category + Filter Bar -->
<div class="category-section">
  <div class="category-tabs">
    <button class="cat-tab active" data-cat="Club Jersey">Club Jerseys</button>
    <button class="cat-tab" data-cat="Retro Club Jersey">Retro Club</button>
    <button class="cat-tab" data-cat="National Team Jersey">National Teams</button>
    <button class="cat-tab" data-cat="Retro National Team Jersey">Retro National</button>
    <button class="cat-tab" data-cat="Special Edition Jersey">Special Edition</button>
  </div>
  <div class="filter-row">
    <span class="products-count" id="products-count">Loading...</span>
    <select class="team-select" id="team-select">
      <option value="">All Teams</option>
    </select>
  </div>
</div>

<!-- Products -->
<section class="products-section">
  <div id="products-grid" class="products-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading jerseys...</p>
    </div>
  </div>
</section>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/js/index.js"></script>
</body>
</html>
