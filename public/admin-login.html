<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Jersivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --grad-start: #48A6FD; --grad-end: #04FBFF; --border: #2a2a2a; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a; color: #e5e5e5; font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 14px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
    }
    .login-logo {
      font-family: 'Bebas Neue'; font-size: 2.2rem; letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: block; text-align: center; margin-bottom: 0.25rem;
    }
    .login-sub { text-align: center; font-size: 0.78rem; color: #555; margin-bottom: 2rem; letter-spacing: 0.06em; text-transform: uppercase; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
    .field label { font-size: 0.75rem; color: #777; letter-spacing: 0.03em; }
    .field input {
      background: #111; border: 1px solid var(--border); color: #e5e5e5;
      font-family: 'DM Sans'; font-size: 0.9rem; padding: 10px 14px;
      border-radius: 8px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--grad-start); }
    .login-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      border: none; border-radius: 8px;
      color: #000; font-family: 'DM Sans'; font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.03em; cursor: pointer; margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .error-msg { color: #e55; font-size: 0.82rem; margin-top: 0.75rem; text-align: center; min-height: 1.2em; }
  </style>
</head>
<body>
<div class="login-box">
  <span class="login-logo">JERSIVO</span>
  <p class="login-sub">Admin Panel</p>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
  </div>
  <button class="login-btn" id="login-btn">Sign In</button>
  <p class="error-msg" id="error-msg"></p>
</div>
<script src="/js/admin-login.js"></script>
</body>
</html>
