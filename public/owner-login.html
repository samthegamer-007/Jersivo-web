<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - Jersivo</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #0a0a0a; color: #e5e5e5; line-height: 1.6; display: flex; align-items: center; justify-content: center; min-height: 100vh;}
        .login-container {background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 24px; padding: 48px; max-width: 450px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4);}
        .login-header {text-align: center; margin-bottom: 40px;}
        .login-icon {font-size: 64px; margin-bottom: 16px;}
        .login-title {font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px;}
        .login-subtitle {font-size: 14px; color: #999;}
        .form-group {margin-bottom: 24px;}
        .form-group label {display: block; color: #999; margin-bottom: 8px; font-weight: 600; font-size: 14px;}
        .form-group input {width: 100%; padding: 14px 16px; background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 12px; color: #e5e5e5; font-size: 16px; transition: border-color 0.3s;}
        .form-group input:focus {outline: none; border-color: #667eea;}
        .error-message {background: rgba(245, 87, 108, 0.1); border: 1px solid #f5576c; color: #f5576c; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 24px; display: none;}
        .error-message.active {display: block;}
        .submit-btn {width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.3s;}
        .submit-btn:hover {transform: translateY(-2px);}
        .submit-btn:disabled {opacity: 0.5; cursor: not-allowed; transform: none;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">👑</div>
            <h1 class="login-title">Owner Login</h1>
            <p class="login-subtitle">Jersivo Control Center</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Login</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Hide previous errors
            errorMessage.classList.remove('active');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/owner';
                } else {
                    errorMessage.textContent = data.error || 'Invalid credentials';
                    errorMessage.classList.add('active');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('active');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
